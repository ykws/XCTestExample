name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, feature/* ]

  workflow_dispatch:

jobs:
  build:
    runs-on: macOS-latest

    steps:
      - uses: actions/checkout@v3

      - name: Test
        run: xcodebuild test -project XCTestExample.xcodeproj/ -scheme XCTestExample -resultBundlePath TestResults -sdk iphonesimulator -destination "platform=iOS Simulator,name=iPhone 17"
        
      - name: Export summary JSON
        run: |
          xcrun xcresulttool get test-results summary \
            --path TestResults.xcresult > summary.json

      - name: Pretty print xcresult summary
        uses: ./.github/actions/pretty-xcresult
        with:
          summary-path: summary.json
