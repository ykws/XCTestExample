name: pretty-xcresult-action
description: Render xcresult summary JSON to GitHub job summary

inputs:
  summary-path:
    description: Path to xcresult summary JSON
    required: true

runs:
  using: composite
  steps:
    - name: Render summary markdown
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/render-summary.sh"
        "${{ github.action_path }}/render-summary.sh" "${{ inputs.summary-path }}"
