name: pretty-xcresult-action
description: Render xcresult JSON outputs to GitHub job summary

inputs:
  summary-path:
    description: Path to summary JSON (xcresulttool get test-results summary)
    required: true
  tests-path:
    description: Path to tests JSON (xcresulttool get test-results tests)
    required: false
    default: ''
  coverage-path:
    description: Path to coverage JSON (xccov view --report --json)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Render summary markdown
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/render-summary.sh"
        "${{ github.action_path }}/render-summary.sh" "${{ inputs.summary-path }}"

    - name: Render tests markdown
      if: inputs.tests-path != ''
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/render-tests.sh"
        "${{ github.action_path }}/render-tests.sh" "${{ inputs.tests-path }}"

    - name: Render coverage markdown
      if: inputs.coverage-path != ''
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/render-coverage.sh"
        "${{ github.action_path }}/render-coverage.sh" "${{ inputs.coverage-path }}"
